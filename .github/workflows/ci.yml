name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run go test ./...
        run: go test ./... -count=1

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run go test ./...
        run: go test ./... -count=1

  relay-smoke-linux:
    name: Relay Smoke (Linux)
    needs: test-linux
    runs-on: ubuntu-latest
    env:
      WINKYOU_FORCE_RELAY: "1"
      WINKYOU_NETIF_ALLOW_MEMORY: "1"
      WINKYOU_TUNNEL_ALLOW_MEMORY: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run relay wggo smoke
        run: go test ./pkg/client -run TestRelayWGGoTwoEnginesExchangeIPv4Packets -count=3
