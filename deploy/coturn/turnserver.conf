# WinkYou coturn configuration
# Replace <EXTERNAL_IP> with your server's public IP

listening-port=3478
listening-ip=0.0.0.0

# External IP for relay candidates
# IMPORTANT: Set this to your server's public IP
external-ip=<EXTERNAL_IP>

# Relay port range
# IMPORTANT: These UDP ports must be open in your firewall
min-port=49152
max-port=65535

# Realm
realm=winkyou

# Static credentials (change these in production)
user=winkdemo:winkdemo-pass

# Logging
verbose
log-file=/var/log/coturn/turnserver.log

# Security
fingerprint
lt-cred-mech

# Performance
no-multicast-peers
no-cli
