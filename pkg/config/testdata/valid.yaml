node:
  name: "my-node"

log:
  level: "warn"
  format: "json"
  output: "stderr"

coordinator:
  url: "https://coord.example.com:443"
  timeout: 15s
  auth_key: "secret"

netif:
  backend: "userspace"
  mtu: 1400

wireguard:
  private_key: "private-key"
  listen_port: 51821

nat:
  stun_servers:
    - "stun:stun.example.com:3478"
  turn_servers:
    - url: "turn:relay.example.com:3478"
      username: "wink"
      password: "secret"

connectivity:
  mode: auto
  strategy_order:
    - legacy_ice_udp
    - relay_only
    - tcp_framed

tcp_framed:
  enabled: true
  listen_addr: "127.0.0.1:0"
  advertise_addr: "127.0.0.1:12345"
  dial_timeout: 2s
