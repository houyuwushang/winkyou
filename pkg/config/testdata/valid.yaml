node:
  name: "my-node"
  advertise_routes:
    - "10.6.22.0/24"

log:
  level: "warn"
  format: "json"
  output: "stderr"

coordinator:
  url: "https://coord.example.com:443"
  timeout: 15s
  auth_key: "secret"

netif:
  backend: "userspace"
  mtu: 1400

wireguard:
  private_key: "private-key"
  listen_port: 51821

nat:
  stun_servers:
    - "stun:stun.example.com:3478"
  turn_servers:
    - url: "turn:relay.example.com:3478"
      username: "wink"
      password: "secret"
  candidate_port_min: 40000
  candidate_port_max: 40100
  candidate_interface_include:
    - "Ethernet"
  candidate_interface_exclude:
    - "tailscale0"
  candidate_cidr_include:
    - "192.168.0.0/16"
  candidate_cidr_exclude:
    - "100.64.0.0/10"
  nat1to1_candidate_type: srflx
  nat1to1_ips:
    - "203.0.113.10/192.168.0.10"
  direct_trusted_cidrs:
    - "100.64.0.0/10"
  public_direct_trusted_cidrs:
    - "198.18.0.0/15"

connectivity:
  mode: auto
  strategy_order:
    - legacy_ice_udp
    - relay_only
    - tcp_framed
  multipath:
    enabled: true
    protect_direct: true
    max_paths: 3
    shadow_write: false
    dependency_penalty: 50
    direct_protection_bonus: 100

tcp_framed:
  enabled: true
  listen_addr: "127.0.0.1:0"
  advertise_addr: "127.0.0.1:12345"
  dial_timeout: 2s
